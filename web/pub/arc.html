
<!DOCTYPE html>
<html lang="en">
	<head>
		<link rel="stylesheet" href="css/arc.css" />
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ARC Control Panel</title>

	</head>
	<body>
		<div class="panel-container">
			<h1>ARC</h1>

			<div class="device-info">
				<div class="device-name" id="device-name">Disconnected</div>
				<div class="device-status">
					<div class="status-indicator">
						<div class="status-dot" id="connection-status-dot"></div>
						<span id="connection-status-text">Disconnected</span>
					</div>
					<div class="status-indicator">
						<div class="status-dot" id="osc-status-dot"></div>
						<span id="osc-status-text">OSC Inactive</span>
					</div>
				</div>
			</div>
			<div class="instructions">
				<button class="refresh-btn" id="refresh-status">Refresh ARC Connection</button>
			</div>
			<div class="led-controls">
				<!-- Row 1 -->
				<div class="led-row">
					<button class="led-btn" data-led-index="0">
						SNAP 1
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="1">
						SNAP 2
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="2">
						SNAP 3
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="3">
						SNAP 4
						<span class="led-index"></span>
					</button>
				</div>
				<!-- Row 2 -->
				<div class="led-row">
					<button class="led-btn" data-led-index="4">
						SNAP 5
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="5">
						SNAP 6
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="6">
						SNAP 7
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="7">
						SNAP 8
						<span class="led-index"></span>
					</button>
				</div>
				<!-- Row 3 -->
				<div class="led-row">
					<button class="led-btn" data-led-index="8">
						MONO
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="9">
						VOL PH 1
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="10">
						VOL PH 2
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="11">
						EXT INP
						<span class="led-index"></span>
					</button>
				</div>
				<!-- Row 4 -->
				<div class="led-row led-row-last">
					<button class="led-btn" data-led-index="12">
						TALKBACK
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="13">
						SPEAKER B
						<span class="led-index"></span>
					</button>
					<button class="led-btn" data-led-index="14">
						DIM
						<span class="led-index"></span>
					</button>
				</div>
				<div class="led-row">
					<button class="led-btn" data-led-index="15">
						PEDAL
						<span class="led-index"></span>
					</button>
				</div>
			</div>


			<div class="status-bar">
				<div class="current-state">Current LED State:</div>
				<div class="hex-value">0x0000</div>
			</div>
		</div>


			<script>
				let currentLedState = 0x0000;
				function sendOSCCommand(value) {
					if (window.opener) {
						window.opener.postMessage({
							type: 'OSC_COMMAND',
							command: '/setup/arcleds',
							args: [value]
						}, '*');
					}
				}
				function updateConnectionStatus(data) {
					const connectionDot = document.getElementById('connection-status-dot');
					const connectionText = document.getElementById('connection-status-text');
					const oscDot = document.getElementById('osc-status-dot');
					const oscText = document.getElementById('osc-status-text');
					const deviceName = document.getElementById('device-name');
					if (data.deviceName) {
						deviceName.textContent = data.deviceName;
					}
					if (data.connected) {
						connectionDot.classList.add('connected');
						connectionText.textContent = 'Connected';
					} else {
						connectionDot.classList.remove('connected');
						connectionText.textContent = 'Disconnected';
					}
					if (data.oscActive) {
						oscDot.classList.add('connected');
						oscText.textContent = 'OSC Active';
					} else {
						oscDot.classList.remove('connected');
						oscText.textContent = 'OSC Inactive';
					}
				}
				document.addEventListener('DOMContentLoaded', () => {
					const ledButtons = document.querySelectorAll('.led-btn');
					const hexValueDisplay = document.querySelector('.hex-value');
					const refreshBtn = document.getElementById('refresh-status');
					ledButtons.forEach(btn => {
						const index = parseInt(btn.dataset.ledIndex);
						btn.addEventListener('click', () => {
							const bitMask = 1 << index;
							currentLedState ^= bitMask;
							btn.classList.toggle('active', (currentLedState & bitMask) !== 0);
							const hexValue = currentLedState.toString(16).padStart(4, '0').toUpperCase();
							hexValueDisplay.textContent = `0x${hexValue}`;
							sendOSCCommand(currentLedState);
							btn.style.transform = 'scale(0.95)';
							setTimeout(() => {
								btn.style.transform = '';
							}, 200);
						});
					});
					window.addEventListener('message', (event) => {
						if (event.data.type === 'CONNECTION_STATUS') {
							updateConnectionStatus(event.data);
						}
					});
					refreshBtn.addEventListener('click', () => {
						if (window.opener) {
							window.opener.postMessage({ type: 'REQUEST_STATUS_UPDATE' }, '*');
						}
					});
					if (window.opener) {
						window.opener.postMessage({ type: 'REQUEST_INITIAL_DATA' }, '*');
					}
				});
			</script>
	</body>
</html>
